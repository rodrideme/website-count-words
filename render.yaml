services:
  - type: web
    name: website-word-counter
    env: docker
    plan: pro
    dockerfilePath: ./Dockerfile
    healthCheckPath: /login
    envVars:
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: DB_PATH
        value: /var/data/wordcount.db
      - key: MEMORY_LIMIT_MB
        value: "3200"
    disk:
      name: wordcounter-data
      mountPath: /var/data
      sizeGB: 1
