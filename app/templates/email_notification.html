<div style="background:#F6F4EF; padding:32px 16px; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:520px; margin:0 auto; background:#FFFFFF; border-radius:12px; overflow:hidden; border:1px solid #E4E1D6;">
    <tr>
      <td style="background:#175E45; padding:18px 28px;">
        <span style="color:#F6F4EF; font-size:17px; font-weight:700; letter-spacing:-0.3px;">Word Counter</span>
      </td>
    </tr>
    <tr>
      <td style="padding:28px;">
        <h1 style="margin:0 0 12px; font-size:19px; color:#191712;">{{ heading }}</h1>
        <p style="margin:0 0 20px; font-size:14px; color:#6E6A5E; line-height:1.5;">{{ intro_text }}</p>

        {% if stats %}
        <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="margin-bottom:24px;">
          {% for label, value in stats %}
          <tr>
            <td style="padding:8px 0; border-bottom:1px solid #F0EDE4; font-size:13px; color:#6E6A5E;">{{ label }}</td>
            <td style="padding:8px 0; border-bottom:1px solid #F0EDE4; font-size:14px; color:#191712; font-weight:600; text-align:right;">{{ value }}</td>
          </tr>
          {% endfor %}
        </table>
        {% endif %}

        {% if cta_url %}
        <a href="{{ cta_url }}" style="display:inline-block; background:#175E45; color:#F6F4EF; text-decoration:none; padding:12px 24px; border-radius:8px; font-size:14px; font-weight:600;">{{ cta_label }}</a>
        {% endif %}
      </td>
    </tr>
    <tr>
      <td style="padding:14px 28px; background:#FBFAF7; border-top:1px solid #E4E1D6;">
        <span style="font-size:12px; color:#A5A093;">Website Word Counter</span>
      </td>
    </tr>
  </table>
</div>
